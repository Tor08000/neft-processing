services:
  smoke-minio:
    profiles:
      - smoke
    image: quay.io/minio/mc:latest
    env_file:
      - .env
    depends_on:
      minio-health:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint: >
      /bin/sh -c '
      set -eu
      endpoint="${MINIO_ENDPOINT:-${NEFT_S3_ENDPOINT:-http://minio:9000}}"
      access="${NEFT_S3_ACCESS_KEY:?NEFT_S3_ACCESS_KEY is required in .env}"
      secret="${NEFT_S3_SECRET_KEY:?NEFT_S3_SECRET_KEY is required in .env}"
      bucket_main="${NEFT_S3_BUCKET:-neft}"
      bucket_invoices="${NEFT_S3_BUCKET_INVOICES:-neft-invoices}"
      bucket_payouts="${NEFT_S3_BUCKET_PAYOUTS:-neft-payouts}"

      echo "[smoke-minio] configuring mc alias..."
      mc alias set local "$endpoint" "$access" "$secret" >/dev/null

      echo "[smoke-minio] verifying buckets exist..."
      mc stat "local/${bucket_main}" >/dev/null
      if [ "$bucket_invoices" != "$bucket_main" ]; then
        mc stat "local/${bucket_invoices}" >/dev/null
      fi
      if [ "$bucket_payouts" != "$bucket_main" ] && [ "$bucket_payouts" != "$bucket_invoices" ]; then
        mc stat "local/${bucket_payouts}" >/dev/null
      fi

      echo "[smoke-minio] ok"
      '

  smoke-tests:
    profiles:
      - smoke
    image: python:3.11-slim
    env_file:
      - .env
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
    entrypoint: >
      python - <<'PY'
      import json, os, sys, time, urllib.request

      AUTH_URL = "http://auth-host:8000/api/v1/auth"
      CORE_URL = "http://core-api:8000/api/v1/admin"
      email = os.getenv("NEFT_BOOTSTRAP_ADMIN_EMAIL", "admin@example.com")
      password = os.getenv("NEFT_BOOTSTRAP_ADMIN_PASSWORD", "admin123")

      def fetch(url, *, method="GET", data=None, headers=None):
          req = urllib.request.Request(url, method=method, headers=headers or {})
          if data is not None and isinstance(data, dict):
              body = json.dumps(data).encode()
              req.data = body
              req.add_header("Content-Type", "application/json")
          elif data is not None:
              req.data = data
          with urllib.request.urlopen(req, timeout=10) as resp:
              return resp.status, resp.read()

      def wait_health(url):
          for _ in range(10):
              try:
                  status, _ = fetch(url)
                  if status == 200:
                      return
              except Exception:
                  time.sleep(1)
          raise RuntimeError(f"service {url} unhealthy")

      print("[smoke] waiting for services...")
      wait_health("http://core-api:8000/api/core/health")
      wait_health("http://auth-host:8000/api/auth/health")

      print("[smoke] login...")
      status, body = fetch(f"{AUTH_URL}/login", method="POST", data={"email": email, "password": password})
      token = json.loads(body.decode()).get("access_token")
      if not token:
          sys.exit("token missing")
      headers = {"Authorization": f"Bearer {token}"}

      print("[smoke] seed demo data...")
      status, body = fetch(f"{CORE_URL}/billing/seed", method="POST", headers=headers)
      seed = json.loads(body.decode())
      period_from = seed.get("period_from")
      period_to = seed.get("period_to") or seed.get("period_from")
      client_id = seed.get("client_id")

      print("[smoke] billing run...")
      payload = {
          "period_type": "ADHOC",
          "start_at": f"{period_from}T00:00:00+00:00",
          "end_at": f"{period_to}T23:59:59+00:00",
          "tz": "UTC",
          "client_id": client_id,
          "idempotency_key": f"smoke:{period_from}",
      }
      status, body = fetch(f"{CORE_URL}/billing/run", method="POST", data=payload, headers=headers)
      billing_result = json.loads(body.decode())
      billing_period_id = billing_result.get("billing_period_id") or seed.get("billing_period_id")
      print("[smoke] billing_period_id", billing_period_id)

      print("[smoke] clearing run...")
      status, body = fetch(
          f"{CORE_URL}/clearing/run?clearing_date={period_from}&idempotency_key=smoke:{period_from}",
          method="POST",
          headers=headers,
      )
      clearing_result = json.loads(body.decode())
      print("[smoke] clearing batches", clearing_result.get("total"))

      print("[smoke] fetch invoice...")
      status, body = fetch(
          f"{CORE_URL}/billing/invoices?period_from={period_from}&period_to={period_to}&client_id={client_id}",
          headers=headers,
      )
      invoice_list = json.loads(body.decode())
      invoice_id = invoice_list["items"][0]["id"]

      status, body = fetch(f"{CORE_URL}/billing/invoices/{invoice_id}", headers=headers)
      invoice_details = json.loads(body.decode())
      print("[smoke] invoice_id", invoice_id)

      print("[smoke] invoice pdf...")
      status, body = fetch(
          f"{CORE_URL}/billing/invoices/{invoice_id}/pdf?idempotency_key=smoke:{invoice_id}",
          method="POST",
          headers=headers,
      )
      pdf_payload = json.loads(body.decode())
      print("[smoke] pdf status", pdf_payload.get("pdf_status"))

      print("[smoke] payment...")
      total_with_tax = int(invoice_details.get("total_with_tax") or invoice_details.get("total_amount"))
      payment_amount = max(total_with_tax // 2, 1)
      status, body = fetch(
          f"{CORE_URL}/finance/payments",
          method="POST",
          headers=headers,
          data={"invoice_id": invoice_id, "amount": payment_amount, "currency": "RUB"},
      )
      payment = json.loads(body.decode())

      status, body = fetch(f"{CORE_URL}/billing/invoices/{invoice_id}", headers=headers)
      after_payment = json.loads(body.decode())
      if int(after_payment.get("amount_due", 0)) != max(total_with_tax - payment_amount, 0):
          sys.exit("due amount mismatch after payment")
      print("[smoke] due after payment", after_payment.get("amount_due"))

      print("[smoke] credit note...")
      credit_amount = max(payment_amount // 2, 1)
      status, body = fetch(
          f"{CORE_URL}/finance/credit-notes",
          method="POST",
          headers=headers,
          data={"invoice_id": invoice_id, "amount": credit_amount, "currency": "RUB", "reason": "smoke"},
      )
      credit_note = json.loads(body.decode())

      status, body = fetch(f"{CORE_URL}/billing/invoices/{invoice_id}", headers=headers)
      after_credit = json.loads(body.decode())
      expected_due = max(total_with_tax - payment_amount - credit_amount, 0)
      if int(after_credit.get("amount_due", 0)) != expected_due:
          sys.exit("due amount mismatch after credit note")
      print("[smoke] due after credit", after_credit.get("amount_due"))

      print("[smoke] reconciliation...")
      status, body = fetch(
          f"{CORE_URL}/billing/reconcile",
          method="POST",
          headers=headers,
          data={"billing_period_id": billing_period_id},
      )
      if status not in (200, 202):
          sys.exit("reconciliation failed")

      print("[smoke] OK")
      PY
