server {
    listen       8080;
    server_name  _;

    # статика Vue/React/Vite-админки
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # health для контейнера admin-web
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    server {
        listen       8080;
        server_name  _;

        # статика Vue/React/Vite-админки
        root   /usr/share/nginx/html;
        index  index.html index.htm;

    # всё, что не API, отдаём как статику + index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- ADMIN API → core-api ----------

    # client.ts по умолчанию шлёт на:
    #   `${window.location.origin}/api/...`
    # поэтому здесь прокидываем /api/ в core-api
    location /api/ {
        proxy_pass http://core-api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- AUTH → auth-host ----------

    # AUTH_BASE_URL в admin-web по умолчанию:
    #   `${window.location.origin}/auth/api`
    # → запросы вида:
    #   /auth/api/v1/auth/login
    # нужно превратить в:
    #   /api/v1/auth/login
    location /auth/api/ {
        rewrite ^/auth(/api/.*)$ $1 break;

        proxy_pass http://auth-host:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
