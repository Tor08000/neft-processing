# services/admin-web/nginx.conf — ADMIN-WEB

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # UPSTREAM'ы для прямого доступа к сервисам из admin-web
    upstream core_api {
        server core-api:8000;
    }

    upstream auth_host {
        server auth-host:8000;
    }

    server {
        listen       8080;
        listen       [::]:8080;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # Health admin-web
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"admin-web"}';
        }

        # Статика Vite
        location /assets/ {
            try_files $uri =404;
        }

        # ====== ПРОКСИ НА AUTH-HOST ======
        # frontend шлёт: /auth/api/v1/auth/login
        # Здесь срезаем /auth → на auth-host уходит /api/v1/auth/login
        location /auth/ {
            proxy_pass http://auth_host/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ====== ПРОКСИ НА CORE-API ======
        # frontend шлёт: /api/...
        # На core-api уходит тот же путь (/api/...)
        location /api/ {
            proxy_pass http://core_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA-режим: всё остальное — index.html
        location / {
            try_files $uri /index.html;
        }
    }
}
