upstream core_api {
    server core-api:8000;
}

upstream auth_host {
    server auth-host:8000;
}

upstream ai_service {
    server ai-service:8000;
}

upstream admin_web {
    server admin-web:80;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_intercept_errors off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Gateway health endpoint
    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    # API upstreams
    location /api/core/ {
        proxy_pass http://core_api/;
    }

    location /api/auth/ {
        proxy_pass http://auth_host/;
    }

    location /api/ai/ {
        proxy_pass http://ai_service/;
    }

    # Admin SPA
    location = /admin {
        return 302 /admin/;
    }

    location = /admin/vite.svg {
        proxy_pass http://admin_web/vite.svg;
    }

    location = /admin/favicon.ico {
        proxy_pass http://admin_web/admin/favicon.ico;
    }

    location = /favicon.ico {
        proxy_pass http://admin_web/favicon.ico;
    }

    location /admin/ {
        proxy_pass http://admin_web/;
    }

    # Redirect root to admin
    location = / {
        return 302 /admin/;
    }
}
