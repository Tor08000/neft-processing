upstream core_api {
    server core-api:8000;
}

upstream auth_host {
    server auth-host:8000;
}

upstream ai_service {
    server ai-service:8000;
}

upstream admin_web {
    server admin-web:80;
}

server {
    listen 80;
    server_name _;

    # health самого gateway
    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    # API
    location /api/core/ {
        proxy_pass http://core_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        proxy_pass http://auth_host/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ai/ {
        proxy_pass http://ai_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Админка — SPA из admin-web по префиксу /admin
    location = /admin {
        return 302 /admin/;
    }

    location /admin/ {
        proxy_pass http://admin_web/;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite favicon for admin-web (учитываем базовый префикс /admin/)
    location = /admin/vite.svg {
        proxy_pass http://admin_web/vite.svg;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Корень редиректит на админку
    location = / {
        return 302 /admin/;
    }
}
