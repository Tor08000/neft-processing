upstream core_api {
    server core-api:8000;
}

upstream auth_host {
    server auth-host:8000;
}

upstream ai_service {
    server ai-service:8000;
}

upstream admin_web {
    server admin-web:80;
}

log_format json_logs escape=json '{ "time": "$time_iso8601", '
  '"remote_addr": "$remote_addr", '
  '"method": "$request_method", '
  '"uri": "$request_uri", '
  '"status": $status, '
  '"body_bytes": $body_bytes_sent, '
  '"request_time": $request_time, '
  '"upstream_time": "$upstream_response_time", '
  '"upstream_addr": "$upstream_addr" }';

access_log /var/log/nginx/access.log json_logs;

# HTTP response compression
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xhtml+xml
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml;

# Example production TLS + HTTP/2 configuration (disabled for local dev)
# server {
#     listen 443 ssl http2;
#     server_name example.com;
#     ...
# }

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_intercept_errors off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    # Gateway health endpoint
    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    # API upstreams
    location /api/core/ {
        proxy_pass http://core_api/;
    }

    location /api/auth/ {
        proxy_pass http://auth_host/;
    }

    location /api/ai/ {
        proxy_pass http://ai_service/;
    }

    # Admin SPA
    location = /admin {
        add_header Cache-Control "no-store" always;
        return 302 /admin/;
    }

    location = /admin/vite.svg {
        proxy_pass http://admin_web/vite.svg;
    }

    location = /admin/favicon.ico {
        proxy_pass http://admin_web/admin/favicon.ico;
    }

    location = /favicon.ico {
        proxy_pass http://admin_web/favicon.ico;
    }

    location /admin/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_pass http://admin_web/;
    }

    location /admin/ {
        add_header Cache-Control "no-store";
        proxy_pass http://admin_web/;
    }

    # Redirect root to admin
    location = / {
        return 302 /admin/;
    }
}
