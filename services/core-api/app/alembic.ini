# services/core-api/app/alembic.ini

[alembic]
# Папка с миграциями относительно ТЕКУЩЕЙ директории (где лежит этот alembic.ini)
script_location = alembic

# URL БД берём из переменной окружения (из .env)
# Фактическое значение подставляется из DATABASE_URL, которую мы задали в .env
sqlalchemy.url = ${DATABASE_URL}

# --- Настройки логирования Alembic ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
