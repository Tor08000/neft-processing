resolver 127.0.0.11 valid=10s;
resolver_timeout 2s;

include /etc/nginx/mime.types;
default_type application/octet-stream;

# Normalize/propagate request id
map $http_x_request_id $gateway_request_id {
    default $http_x_request_id;
    ""      $request_id;
}

map $uri $asset_content_type {
    default "";
    ~*\\.js$ application/javascript;
    ~*\\.mjs$ application/javascript;
    ~*\\.css$ text/css;
}

upstream core_api {
    zone core_api 64k;
    server core-api:8000 resolve;
    keepalive 32;
}

upstream auth_host {
    zone auth_host 64k;
    server auth-host:8000 resolve;
    keepalive 16;
}

upstream ai_service {
    zone ai_service 64k;
    server ai-service:8000 resolve;
    keepalive 16;
}

upstream crm_service {
    zone crm_service 64k;
    server crm-service:8000 resolve;
    keepalive 16;
}

upstream logistics_service {
    zone logistics_service 64k;
    server logistics-service:8000 resolve;
    keepalive 16;
}

upstream document_service {
    zone document_service 64k;
    server document-service:8000 resolve;
    keepalive 16;
}

upstream integration_hub {
    zone integration_hub 64k;
    server integration-hub:8000 resolve;
    keepalive 16;
}

upstream admin_web {
    zone admin_web 64k;
    server admin-web:80;
    keepalive 16;
}

upstream client_web {
    zone client_web 64k;
    server client-web:80;
    keepalive 16;
}

upstream partner_web {
    zone partner_web 64k;
    server partner-web:80;
    keepalive 16;
}

log_format json_logs escape=json '{ "time":"$time_iso8601", '
  '"request_id":"$gateway_request_id", '
  '"remote_addr":"$remote_addr", '
  '"method":"$request_method", '
  '"uri":"$request_uri", '
  '"status":$status, '
  '"upstream_status":"$upstream_status", '
  '"body_bytes":$body_bytes_sent, '
  '"client_body_size":"$content_length", '
  '"request_length":$request_length, '
  '"request_time":$request_time, '
  '"upstream_time":"$upstream_response_time", '
  '"upstream_addr":"$upstream_addr", '
  '"user_agent":"$http_user_agent" }';

access_log /var/log/nginx/access.log json_logs;
# File path reserved for tailing by external collectors (e.g. otel filelog receiver)
access_log /var/log/nginx/otel/access.log json_logs;

error_log /var/log/nginx/error.log warn;

# HTTP response compression
gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_disable "msie6";
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    application/xml
    application/xhtml+xml
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml;

types {
    application/javascript js mjs;
    text/css css;
}

client_max_body_size 25m;
client_body_buffer_size 256k;

# Example production TLS + HTTP/2 configuration (disabled for local dev)
# server {
#     listen 443 ssl http2;
#     server_name example.com;
#     ...
# }

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_intercept_errors off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $gateway_request_id;
    proxy_connect_timeout 3s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    send_timeout 10s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 24k;
    proxy_next_upstream error timeout http_502 http_503;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; connect-src 'self' http://localhost:* http://127.0.0.1:* http://gateway:*; img-src 'self' data:; font-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Cache-Control "no-store"; # default safeguard; overridden below when needed

    location ~* ^/.+\\.js$ {
        add_header X-Content-Type-Options nosniff;
    }

    error_log /var/log/nginx/gateway.error.log error;

    # Gateway health endpoint
    location = /health {
        add_header Content-Type text/plain;
        add_header X-Request-ID $gateway_request_id;
        return 200 "OK\n";
    }

    # API upstreams
    location /api/core/ {
        proxy_pass http://core_api/;
    }

    location /api/auth/ {
        proxy_pass http://auth_host/;
    }

    location /api/ai/ {
        proxy_pass http://ai_service/;
    }

    location /api/crm/ {
        proxy_pass http://crm_service/;
    }

    location /api/logistics/ {
        proxy_pass http://logistics_service/;
    }

    location /api/docs/ {
        proxy_pass http://document_service/;
    }

    location /api/int/ {
        proxy_pass http://integration_hub/;
    }

    location /api/integrations/ {
        proxy_pass http://integration_hub/;
    }

    # Legacy v1 path (kept for backward compatibility without rewrites)
    location /api/v1/ {
        proxy_pass http://core_api;
    }

    location /auth/ {
        rewrite ^/auth(/.*)$ /api/auth$1 permanent;
    }

    location /ai/ {
        rewrite ^/ai(/.*)$ /api/ai$1 permanent;
    }

    location = /ai/health {
        return 301 /api/ai/health;
    }

    location = /auth/health {
        return 301 /api/auth/health;
    }

    location = /api/health {
        return 301 /api/core/health;
    }

    location = /metrics {
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        add_header X-Request-ID $gateway_request_id;
        return 200 "gateway_up 1\n";
    }

    # Admin SPA
    location = /admin {
        add_header Cache-Control "no-store" always;
        return 302 /admin/;
    }

    location = /admin/vite.svg {
        proxy_pass http://admin_web/vite.svg;
    }

    location = /admin/favicon.ico {
        proxy_pass http://admin_web/admin/favicon.ico;
    }

    location = /favicon.ico {
        proxy_pass http://admin_web/favicon.ico;
    }

    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://admin_web/assets/;
    }

    location ^~ /brand/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://admin_web/brand/;
    }

    location ^~ /admin/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://admin_web/assets/;
    }

    location ^~ /admin/brand/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://admin_web/brand/;
    }

    location ^~ /client/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://client_web/assets/;
    }

    location ^~ /client/brand/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://client_web/brand/;
    }

    location ^~ /partner/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://partner_web/assets/;
    }

    location ^~ /partner/brand/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_intercept_errors off;
        error_page 404 =404;
        proxy_pass http://partner_web/brand/;
    }

    location /admin/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://admin_web/;
    }

    location = /admin/index.html {
        add_header Cache-Control "no-store" always;
        proxy_pass http://admin_web/index.html;
    }

    # Client SPA
    location = /client {
        add_header Cache-Control "no-store" always;
        return 302 /client/;
    }

    location = /client/vite.svg {
        proxy_pass http://client_web/vite.svg;
    }

    location /client/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://client_web/;
    }

    location = /client/index.html {
        add_header Cache-Control "no-store" always;
        proxy_pass http://client_web/index.html;
    }

    # Partner SPA
    location = /partner {
        add_header Cache-Control "no-store" always;
        return 302 /partner/;
    }

    location = /partner/vite.svg {
        proxy_pass http://partner_web/vite.svg;
    }

    location /partner/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://partner_web/;
    }

    location = /partner/index.html {
        add_header Cache-Control "no-store" always;
        proxy_pass http://partner_web/index.html;
    }

    # Friendly JSON errors for upstream issues
    error_page 502 503 504 = @gateway_upstream_errors;
    location @gateway_upstream_errors {
        default_type application/json;
        return 502 '{"error":"upstream_unavailable","request_id":"$gateway_request_id"}';
    }

    # Redirect root to admin
    location = / {
        return 302 /admin/;
    }
}
