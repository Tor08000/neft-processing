services:
  postgres:
    image: postgres:16
    container_name: neft-processing-postgres-1
    environment:
      POSTGRES_DB: neft
      POSTGRES_USER: neft
      POSTGRES_PASSWORD: neft
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neft"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: neft-processing-redis-1
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-host:
    build:
      context: .
      dockerfile: services/auth-host/Dockerfile
    container_name: neft-processing-auth-host-1
    environment:
      NEFT_AUTH_DB_URL: postgresql+psycopg2://neft:neft@postgres:5432/neft
      NEFT_AUTH_ADMIN_JWT_ISSUER: neft-auth
      NEFT_AUTH_ADMIN_JWT_AUDIENCE: neft-admin
      NEFT_AUTH_ADMIN_JWT_EXPIRE_MINUTES: 60
      NEFT_AUTH_ADMIN_JWT_ALG: RS256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "8002:8000"   # <<< ВОТ ЭТО МЫ ДОБАВЛЯЕМ, ЧТОБЫ ДОСТУП С ХОСТА

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: neft-processing-core-api-1
    environment:
      NEFT_DB_URL: postgresql+psycopg2://neft:neft@postgres:5432/neft
      NEFT_AUTH_PUBLIC_KEY_URL: http://auth-host:8000/api/v1/auth/public-key
      NEFT_AUTH_ADMIN_JWT_ISSUER: neft-auth
      NEFT_AUTH_ADMIN_JWT_AUDIENCE: neft-admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-host:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: neft-processing-ai-service-1
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "8001:8000"

  workers:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: neft-processing-workers-1
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: neft-processing-beat-1
    command: ["celery", "-A", "app.celery_app.celery_app", "beat", "-l", "info"]
    depends_on:
      workers:
        condition: service_started
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:1.2.0
    container_name: neft-flower
    command: ["celery", "--broker=redis://redis:6379/0", "flower"]
    depends_on:
      workers:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"

  nginx:
    image: nginx:1.27
    container_name: neft-processing-nginx-1
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      flower:
        condition: service_started
    ports:
      - "80:80"

volumes:
  postgres-data:
