services:
  postgres:
    image: postgres:16
    container_name: neft-processing-postgres-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neft}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-scram-sha-256}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---auth=scram-sha-256}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neft} -d ${POSTGRES_DB:-neft}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: neft-processing-redis-1
    command: ["redis-server", "--appendonly", "yes", "--databases", "4"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.6
    container_name: neft-processing-clickhouse-1
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"

  minio:
    image: quay.io/minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: neft-processing-minio-1
    command: ["server", "/data", "--console-address", ":9001"]
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-health:
    image: curlimages/curl:8.12.1
    container_name: neft-processing-minio-health-1
    restart: unless-stopped
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-lc", "sleep infinity"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://minio:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: neft-processing-minio-init-1
    env_file:
      - .env
    volumes:
      - ./infra/minio-init.sh:/infra/minio-init.sh:ro
    depends_on:
      minio-health:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/infra/minio-init.sh"]

  admin-web:
    build:
      context: .
      dockerfile: frontends/admin-ui/Dockerfile
    container_name: neft-processing-admin-web-1
    environment:
      SERVICE_NAME: admin-web
      VITE_API_BASE: http://gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4173:80"

  client-web:
    build:
      context: .
      dockerfile: frontends/client-portal/Dockerfile
    container_name: neft-processing-client-web-1
    environment:
      SERVICE_NAME: client-web
      VITE_API_BASE: http://gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4174:80"

  partner-web:
    build:
      context: .
      dockerfile: frontends/partner-portal/Dockerfile
    container_name: neft-processing-partner-web-1
    environment:
      SERVICE_NAME: partner-web
      VITE_API_BASE_URL: /api
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4175:80"

  auth-host:
    build:
      context: .
      dockerfile: platform/auth-host/Dockerfile
    container_name: neft-processing-auth-host-1
    env_file:
      - .env
    environment:
      SERVICE_NAME: auth-host
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      AUTH_KEY_DIR: /data/keys
      AUTH_PRIVATE_KEY_PATH: /data/keys/private.pem
      AUTH_PUBLIC_KEY_PATH: /data/keys/public.pem
      NEFT_BOOTSTRAP_ADMIN_EMAIL: ${NEFT_BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      NEFT_BOOTSTRAP_ADMIN_PASSWORD: ${NEFT_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      NEFT_BOOTSTRAP_ADMIN_FULL_NAME: ${NEFT_BOOTSTRAP_ADMIN_FULL_NAME:-Platform Admin}
      NEFT_BOOTSTRAP_ADMIN_ROLES: ${NEFT_BOOTSTRAP_ADMIN_ROLES:-ADMIN,PLATFORM_ADMIN,SUPERADMIN}
      NEFT_AUTH_ISSUER: ${NEFT_AUTH_ISSUER:-neft-auth}
      NEFT_AUTH_AUDIENCE: ${NEFT_AUTH_AUDIENCE:-neft-admin}
      BANK_STUB_ENABLED: ${BANK_STUB_ENABLED:-1}
      BANK_STUB_IMMEDIATE_SETTLE: ${BANK_STUB_IMMEDIATE_SETTLE:-1}
      ERP_STUB_ENABLED: ${ERP_STUB_ENABLED:-1}
      ERP_STUB_AUTO_ACK: ${ERP_STUB_AUTO_ACK:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://localhost:8000/api/auth/health', timeout=5); sys.exit(0 if resp.getcode() == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8002:8000"
    volumes:
      - auth-keys:/data/keys

  core-api:
    build:
      context: .
      dockerfile: platform/processing-core/Dockerfile
    container_name: neft-processing-core-api-1
    env_file:
      - .env
    environment:
      SERVICE_NAME: core-api
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      NEFT_DB_SCHEMA: ${NEFT_DB_SCHEMA:-processing_core}
      NEFT_S3_ENDPOINT: ${NEFT_S3_ENDPOINT:-http://minio:9000}
      NEFT_S3_ACCESS_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      NEFT_S3_SECRET_KEY: ${NEFT_S3_SECRET_KEY:-change-me}
      NEFT_S3_BUCKET: ${NEFT_S3_BUCKET:-neft}
      NEFT_S3_BUCKET_INVOICES: ${NEFT_S3_BUCKET_INVOICES:-neft-invoices}
      NEFT_S3_BUCKET_PAYOUTS: ${NEFT_S3_BUCKET_PAYOUTS:-neft-payouts}
      NEFT_S3_BUCKET_ACCOUNTING_EXPORTS: ${NEFT_S3_BUCKET_ACCOUNTING_EXPORTS:-accounting-exports}
      NEFT_S3_BUCKET_DOCUMENTS: ${NEFT_S3_BUCKET_DOCUMENTS:-neft-documents}
      NEFT_S3_REGION: ${NEFT_S3_REGION:-us-east-1}
      NEFT_PDF_AUTO_GENERATE: ${NEFT_PDF_AUTO_GENERATE:-1}
      BI_CLICKHOUSE_ENABLED: ${BI_CLICKHOUSE_ENABLED:-0}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      DOCUMENT_SERVICE_ENABLED: ${DOCUMENT_SERVICE_ENABLED:-0}
      DOCUMENT_SERVICE_URL: ${DOCUMENT_SERVICE_URL:-http://document-service:8000}
      LOGISTICS_SERVICE_ENABLED: ${LOGISTICS_SERVICE_ENABLED:-0}
      LOGISTICS_SERVICE_URL: ${LOGISTICS_SERVICE_URL:-http://logistics-service:8000}
      NEFT_AUTH_ISSUER: ${NEFT_AUTH_ISSUER:-neft-auth}
      NEFT_AUTH_AUDIENCE: ${NEFT_AUTH_AUDIENCE:-neft-admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://localhost:8000/api/core/health', timeout=5); sys.exit(0 if resp.getcode() == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8001:8000"

  ai-service:
    build:
      context: .
      dockerfile: platform/ai-services/risk-scorer/Dockerfile
    container_name: neft-processing-ai-service-1
    environment:
      SERVICE_NAME: ai-service
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; resp = urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5); sys.exit(0 if resp.getcode() == 200 else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8003:8000"

  crm-service:
    build:
      context: .
      dockerfile: platform/crm-service/Dockerfile
    container_name: neft-processing-crm-1
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  logistics-service:
    build:
      context: .
      dockerfile: platform/logistics-service/Dockerfile
    container_name: neft-processing-logistics-1
    environment:
      SERVICE_NAME: logistics-service
      SERVICE_VERSION: v0
      LOGISTICS_PROVIDER: ${LOGISTICS_PROVIDER:-mock}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  document-service:
    build:
      context: .
      dockerfile: platform/document-service/Dockerfile
    container_name: neft-processing-document-1
    environment:
      S3_ENDPOINT: ${NEFT_S3_ENDPOINT:-http://minio:9000}
      S3_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      S3_SECRET: ${NEFT_S3_SECRET_KEY:-change-me}
      S3_REGION: ${NEFT_S3_REGION:-us-east-1}
      S3_BUCKET_DOCS: ${NEFT_S3_BUCKET_DOCUMENTS:-neft-documents}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  workers:
    build:
      context: .
      dockerfile: platform/billing-clearing/Dockerfile
    container_name: neft-processing-workers-1
    env_file:
      - .env
    environment:
      SERVICE_NAME: workers
      ROLE: worker
      QUEUES: celery,default,billing,pdf
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_DEFAULT_QUEUE: celery
      NEFT_S3_ENDPOINT: ${NEFT_S3_ENDPOINT:-http://minio:9000}
      NEFT_S3_ACCESS_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      NEFT_S3_SECRET_KEY: ${NEFT_S3_SECRET_KEY:-change-me}
      NEFT_S3_BUCKET: ${NEFT_S3_BUCKET:-neft}
      NEFT_S3_BUCKET_INVOICES: ${NEFT_S3_BUCKET_INVOICES:-neft-invoices}
      NEFT_S3_BUCKET_PAYOUTS: ${NEFT_S3_BUCKET_PAYOUTS:-neft-payouts}
      NEFT_S3_BUCKET_ACCOUNTING_EXPORTS: ${NEFT_S3_BUCKET_ACCOUNTING_EXPORTS:-accounting-exports}
      NEFT_S3_REGION: ${NEFT_S3_REGION:-us-east-1}
      NEFT_PDF_AUTO_GENERATE: ${NEFT_PDF_AUTO_GENERATE:-1}
      BI_CLICKHOUSE_ENABLED: ${BI_CLICKHOUSE_ENABLED:-0}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from app.celery_app import celery_app; import sys; sys.exit(0 if celery_app.control.ping(timeout=5) else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    command: ["--broker=redis://redis:6379/0", "--port=9808"]
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9808"
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:9808/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  beat:
    build:
      context: .
      dockerfile: platform/billing-clearing/Dockerfile
    container_name: neft-processing-beat-1
    env_file:
      - .env
    environment:
      SERVICE_NAME: beat
      ROLE: beat
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_DEFAULT_QUEUE: celery
      CELERY_BEAT: "true"
      NEFT_S3_ENDPOINT: ${NEFT_S3_ENDPOINT:-http://minio:9000}
      NEFT_S3_ACCESS_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      NEFT_S3_SECRET_KEY: ${NEFT_S3_SECRET_KEY:-change-me}
      NEFT_S3_BUCKET: ${NEFT_S3_BUCKET:-neft}
      NEFT_S3_BUCKET_INVOICES: ${NEFT_S3_BUCKET_INVOICES:-neft-invoices}
      NEFT_S3_BUCKET_PAYOUTS: ${NEFT_S3_BUCKET_PAYOUTS:-neft-payouts}
      NEFT_S3_BUCKET_ACCOUNTING_EXPORTS: ${NEFT_S3_BUCKET_ACCOUNTING_EXPORTS:-accounting-exports}
      NEFT_S3_REGION: ${NEFT_S3_REGION:-us-east-1}
      NEFT_PDF_AUTO_GENERATE: ${NEFT_PDF_AUTO_GENERATE:-1}
      BI_CLICKHOUSE_ENABLED: ${BI_CLICKHOUSE_ENABLED:-0}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from app.celery_app import celery_app; import sys; conn = celery_app.connection(); conn.ensure_connection(max_retries=1); conn.release(); sys.exit(0)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  flower:
    build:
      context: .
      dockerfile: services/flower/Dockerfile
    container_name: neft-processing-flower-1
    env_file:
      - .env
    environment:
      SERVICE_NAME: flower
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_DEFAULT_QUEUE: celery
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:change-me}
    depends_on:
      redis:
        condition: service_healthy
      workers:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import base64,json,os,sys,urllib.request; auth=os.getenv('FLOWER_BASIC_AUTH','admin:change-me'); req=urllib.request.Request('http://localhost:5555/api/workers?refresh=1', headers={'Authorization': 'Basic ' + base64.b64encode(auth.encode()).decode()}); data=json.load(urllib.request.urlopen(req, timeout=5)); sys.exit(0 if data else 1)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5555:5555"
    command:
      - python
      - -m
      - celery
      - -A
      - app.celery_app:celery_app
      - flower
      - --port=5555
      - --address=0.0.0.0
      - --basic_auth=${FLOWER_BASIC_AUTH:-admin:change-me}

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: neft-processing-gateway:latest
    container_name: neft-processing-gateway-1
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    build:
      context: .
      dockerfile: infra/otel-collector.Dockerfile
    image: neft-processing-otel-collector:latest
    container_name: neft-processing-otel-collector-1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: neft-processing-jaeger-1
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4317
    ports:
      - "16686:16686"
      - "14250:14250"
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.10
    container_name: neft-processing-loki-1
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.10
    container_name: neft-processing-promtail-1
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    ports:
      - "9080:9080"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: neft-processing-prometheus-1
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.1
    container_name: neft-processing-grafana-1
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
  clickhouse-data:
  auth-keys:
  loki-data:
