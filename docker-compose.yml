services:
  postgres:
    image: postgres:16
    container_name: neft-processing-postgres-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neft}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neft} -d ${POSTGRES_DB:-neft}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: neft-processing-redis-1
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  admin-web:
    build:
      context: .
      dockerfile: services/admin-web/Dockerfile
    container_name: neft-processing-admin-web-1
    environment:
      SERVICE_NAME: admin-web
      VITE_CORE_API_URL: http://gateway/api/core
      VITE_AUTH_HOST_URL: http://gateway/api/auth
      VITE_AI_SERVICE_URL: http://gateway/api/ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4173:80"

  auth-host:
    build:
      context: .
      dockerfile: services/auth-host/Dockerfile
    container_name: neft-processing-auth-host-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: auth-host
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8002:8000"

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: neft-processing-core-api-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: core-api
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8001:8000"

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: neft-processing-ai-service-1
    environment:
      SERVICE_NAME: ai-service
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8003:8000"

  workers:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: neft-processing-workers-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: workers
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: neft-processing-beat-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: beat
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_BEAT: "true"
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: services/flower/Dockerfile
    container_name: neft-processing-flower-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: flower
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5555:5555"

  gateway:
    image: nginx:1.27-alpine
    container_name: neft-processing-gateway-1
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres-data:
