services:
  postgres:
    image: postgres:16
    container_name: neft-processing-postgres-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neft}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neft} -d ${POSTGRES_DB:-neft}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: neft-processing-redis-1
    command: ["redis-server", "--appendonly", "yes", "--databases", "4"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: neft-processing-minio-1
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-web:
    build:
      context: .
      dockerfile: frontends/admin-ui/Dockerfile
    container_name: neft-processing-admin-web-1
    environment:
      SERVICE_NAME: admin-web
      VITE_CORE_API_URL: http://gateway/api/core
      VITE_AUTH_HOST_URL: http://gateway/api/auth
      VITE_AI_SERVICE_URL: http://gateway/api/ai
      VITE_ADMIN_BASE_PATH: /admin/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4173:80"

  client-web:
    build:
      context: .
      dockerfile: frontends/client-portal/Dockerfile
    container_name: neft-processing-client-web-1
    environment:
      SERVICE_NAME: client-web
      VITE_CLIENT_BASE_PATH: /client/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "4174:80"

  auth-host:
    build:
      context: .
      dockerfile: platform/auth-host/Dockerfile
    container_name: neft-processing-auth-host-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: auth-host
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8002:8000"

  core-api:
    build:
      context: .
      dockerfile: platform/processing-core/Dockerfile
    container_name: neft-processing-core-api-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: core-api
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8001:8000"

  ai-service:
    build:
      context: .
      dockerfile: platform/ai-services/risk-scorer/Dockerfile
    container_name: neft-processing-ai-service-1
    environment:
      SERVICE_NAME: ai-service
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8003:8000"

  crm-service:
    image: alpine:3.20
    container_name: neft-processing-crm-1
    command: ["/bin/sh", "-c", "sleep infinity"]
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 60s
      timeout: 5s
      retries: 3

  logistics-service:
    image: alpine:3.20
    container_name: neft-processing-logistics-1
    command: ["/bin/sh", "-c", "sleep infinity"]
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 60s
      timeout: 5s
      retries: 3

  document-service:
    image: alpine:3.20
    container_name: neft-processing-document-1
    command: ["/bin/sh", "-c", "sleep infinity"]
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 60s
      timeout: 5s
      retries: 3

  workers:
    build:
      context: .
      dockerfile: platform/billing-clearing/Dockerfile
    container_name: neft-processing-workers-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: workers
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_DEFAULT_QUEUE: celery
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: platform/billing-clearing/Dockerfile
    container_name: neft-processing-beat-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: beat
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_DEFAULT_QUEUE: celery
      CELERY_BEAT: "true"
    depends_on:
      core-api:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: services/flower/Dockerfile
    container_name: neft-processing-flower-1
    env_file:
      - .env.example
    environment:
      SERVICE_NAME: flower
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_DEFAULT_QUEUE: celery
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:change-me}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS --max-time 5 -u ${FLOWER_BASIC_AUTH:-admin:change-me} http://localhost:5555/api/workers?refresh=1"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5555:5555"
    command:
      - python
      - -m
      - celery
      - -A
      - services.workers.app.celery_app:celery_app
      - flower
      - --port=5555
      - --address=0.0.0.0
      - --basic_auth=${FLOWER_BASIC_AUTH:-admin:change-me}

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: neft-processing-gateway:latest
    container_name: neft-processing-gateway-1
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: neft-processing-otel-collector-1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:13133/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: neft-processing-jaeger-1
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: neft-processing-prometheus-1
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.1
    container_name: neft-processing-grafana-1
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
