name: neft-processing

x-env-file: &env_file
  - .env

x-app-env: &app_env
  env_file: *env_file
  environment:
    APP_ENV: ${APP_ENV:-dev}
    NEFT_ENV: ${NEFT_ENV:-dev}
    DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/2}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}

services:
  postgres:
    image: postgres:16
    container_name: neft-processing-postgres-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-scram-sha-256}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---auth=scram-sha-256}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neft} -d ${POSTGRES_DB:-neft}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: neft-processing-redis-1
    command: ["redis-server", "--appendonly", "yes", "--databases", "8"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: neft-processing-mailpit-1
    ports:
      - "1025:1025"
      - "8025:8025"

  clickhouse:
    image: clickhouse/clickhouse-server:24.6
    container_name: neft-processing-clickhouse-1
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-neft_geo}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "8123:8123"
      - "9002:9000"

  clickhouse-init:
    image: clickhouse/clickhouse-server:24.6
    container_name: neft-processing-clickhouse-init-1
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
    volumes:
      - ./analytics/ddl:/docker-entrypoint-initdb.d:ro
      - ./infra/clickhouse-init.sh:/infra/clickhouse-init.sh:ro
    entrypoint: ["/bin/bash", "/infra/clickhouse-init.sh"]

  minio:
    image: quay.io/minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: neft-processing-minio-1
    env_file: *env_file
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-change-me}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: neft-processing-minio-init-1
    env_file: *env_file
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio-init.sh:/infra/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/infra/minio-init.sh"]

  auth-host:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/auth-host/Dockerfile
    container_name: neft-processing-auth-host-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-neft}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-neft}
      AUTH_KEY_DIR: /data/keys
      AUTH_PRIVATE_KEY_PATH: /data/keys/private.pem
      AUTH_PUBLIC_KEY_PATH: /data/keys/public.pem
      DEV_SEED_USERS: ${DEV_SEED_USERS:-1}
      NEFT_BOOTSTRAP_ADMIN_EMAIL: ${NEFT_BOOTSTRAP_ADMIN_EMAIL:-admin@neft.local}
      NEFT_BOOTSTRAP_ADMIN_PASSWORD: ${NEFT_BOOTSTRAP_ADMIN_PASSWORD:-Neft123!}
      NEFT_BOOTSTRAP_ADMIN_ROLES: ${NEFT_BOOTSTRAP_ADMIN_ROLES:-ADMIN,PLATFORM_ADMIN,SUPERADMIN}
      NEFT_BOOTSTRAP_CLIENT_EMAIL: ${NEFT_BOOTSTRAP_CLIENT_EMAIL:-client@neft.local}
      NEFT_BOOTSTRAP_CLIENT_PASSWORD: ${NEFT_BOOTSTRAP_CLIENT_PASSWORD:-Client123!}
      NEFT_BOOTSTRAP_CLIENT_ROLES: ${NEFT_BOOTSTRAP_CLIENT_ROLES:-CLIENT_OWNER}
      NEFT_BOOTSTRAP_PARTNER_EMAIL: ${NEFT_BOOTSTRAP_PARTNER_EMAIL:-partner@neft.local}
      NEFT_BOOTSTRAP_PARTNER_PASSWORD: ${NEFT_BOOTSTRAP_PARTNER_PASSWORD:-Partner123!}
      NEFT_BOOTSTRAP_PARTNER_ROLES: ${NEFT_BOOTSTRAP_PARTNER_ROLES:-PARTNER_OWNER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - auth-keys:/data/keys
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "8002:8000"

  core-api:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/processing-core/Dockerfile
    container_name: neft-processing-core-api-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      NEFT_ENV: ${NEFT_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      AUTH_HOST_MODE: ${AUTH_HOST_MODE:-external}
      AUTH_PUBLIC_KEY_URL: ${AUTH_PUBLIC_KEY_URL:-http://auth-host:8000/api/v1/auth/public-key}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-http://auth-host:8000/api/v1/auth/.well-known/jwks.json}
      ADMIN_PUBLIC_KEY_URL: ${ADMIN_PUBLIC_KEY_URL:-http://auth-host:8000/api/v1/auth/public-key}
      DOCUMENT_SERVICE_ENABLED: ${DOCUMENT_SERVICE_ENABLED:-1}
      DOCUMENT_SERVICE_URL: ${DOCUMENT_SERVICE_URL:-http://document-service:8000}
      INTEGRATION_HUB_URL: ${INTEGRATION_HUB_URL:-http://integration-hub:8000}
      INTEGRATION_HUB_INTERNAL_TOKEN: ${INTEGRATION_HUB_INTERNAL_TOKEN:-change-me}
      OTP_ENABLED: ${OTP_ENABLED:-1}
      OTP_TEST_MODE: ${OTP_TEST_MODE:-0}
      LOGISTICS_SERVICE_ENABLED: ${LOGISTICS_SERVICE_ENABLED:-1}
      LOGISTICS_SERVICE_URL: ${LOGISTICS_SERVICE_URL:-http://logistics-service:8000}
      LOGISTICS_INTERNAL_TOKEN: ${LOGISTICS_INTERNAL_TOKEN:-change-me}
      BI_CLICKHOUSE_ENABLED: ${BI_CLICKHOUSE_ENABLED:-1}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-neft_geo}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-change-me}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me}
      NEFT_S3_ENDPOINT: ${NEFT_S3_ENDPOINT:-http://minio:9000}
      NEFT_S3_ACCESS_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      NEFT_S3_SECRET_KEY: ${NEFT_S3_SECRET_KEY:-change-me}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-change-me}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me}
      NEFT_EMAIL_MODE: ${NEFT_EMAIL_MODE:-mailpit}
      NEFT_EMAIL_HOST: ${NEFT_EMAIL_HOST:-mailpit}
      NEFT_EMAIL_PORT: ${NEFT_EMAIL_PORT:-1025}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "8001:8000"

  ai-service:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/ai-services/risk-scorer/Dockerfile
    container_name: neft-processing-ai-service-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      SERVICE_NAME: ai-service
      AI_MODEL_NAME: ${AI_MODEL_NAME:-local-dummy}
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "8003:8000"

  document-service:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/document-service/Dockerfile
    container_name: neft-processing-document-service-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      SERVICE_NAME: document-service
      PROVIDER_X_MODE: ${PROVIDER_X_MODE:-degraded}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      S3_SECRET: ${NEFT_S3_SECRET_KEY:-change-me}
      NEFT_S3_ENDPOINT: ${NEFT_S3_ENDPOINT:-http://minio:9000}
      NEFT_S3_ACCESS_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      NEFT_S3_SECRET_KEY: ${NEFT_S3_SECRET_KEY:-change-me}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "8004:8000"

  integration-hub:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/integration-hub/Dockerfile
    container_name: neft-processing-integration-hub-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      SERVICE_NAME: integration-hub
      INTEGRATION_HUB_DATABASE_URL: ${INTEGRATION_HUB_DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      DATABASE_URL: ${INTEGRATION_HUB_DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_KEY: ${NEFT_S3_ACCESS_KEY:-change-me}
      S3_SECRET: ${NEFT_S3_SECRET_KEY:-change-me}
      DIADOK_MODE: ${DIADOK_MODE:-sandbox}
      SBIS_MODE: ${SBIS_MODE:-sandbox}
      NOTIFICATIONS_MODE: ${NOTIFICATIONS_MODE:-sandbox}
      EMAIL_PROVIDER_MODE: ${EMAIL_PROVIDER_MODE:-sandbox}
      OTP_PROVIDER_MODE: ${OTP_PROVIDER_MODE:-sandbox}
      BANK_API_MODE: ${BANK_API_MODE:-sandbox}
      ERP_1C_MODE: ${ERP_1C_MODE:-sandbox}
      FUEL_PROVIDER_MODE: ${FUEL_PROVIDER_MODE:-sandbox}
      LOGISTICS_PROVIDER_MODE: ${LOGISTICS_PROVIDER_MODE:-sandbox}
      WEBHOOK_INTAKE_SECRET: ${WEBHOOK_INTAKE_SECRET:-change-me}
      WEBHOOK_ALLOW_UNSIGNED: ${WEBHOOK_ALLOW_UNSIGNED:-true}
      INTEGRATION_HUB_INTERNAL_TOKEN: ${INTEGRATION_HUB_INTERNAL_TOKEN:-change-me}
      INTEGRATION_HUB_AUTO_CREATE_SCHEMA: ${INTEGRATION_HUB_AUTO_CREATE_SCHEMA:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "8005:8000"
      - "8010:8000"

  logistics-service:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/logistics-service/Dockerfile
    container_name: neft-processing-logistics-service-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      SERVICE_NAME: logistics-service
      LOGISTICS_PROVIDER: ${LOGISTICS_PROVIDER:-integration_hub}
      LOGISTICS_COMPUTE_PROVIDER: ${LOGISTICS_COMPUTE_PROVIDER:-osrm}
      LOGISTICS_INTERNAL_TOKEN: ${LOGISTICS_INTERNAL_TOKEN:-change-me}
      INTEGRATION_HUB_BASE_URL: ${INTEGRATION_HUB_BASE_URL:-http://integration-hub:8000}
      INTEGRATION_HUB_INTERNAL_TOKEN: ${INTEGRATION_HUB_INTERNAL_TOKEN:-change-me}
    depends_on:
      integration-hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "8006:8000"

  crm-service:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/crm-service/Dockerfile
    container_name: neft-processing-crm-service-1
    environment:
      APP_ENV: ${APP_ENV:-dev}
      CRM_DATABASE_URL: ${CRM_DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      DATABASE_URL: ${CRM_DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      CRM_JWKS_URL: ${CRM_JWKS_URL:-http://auth-host:8000/api/v1/auth/.well-known/jwks.json}
      CRM_INTERNAL_TOKEN: ${CRM_INTERNAL_TOKEN:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      auth-host:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "8007:8000"

  billing-worker:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/billing-clearing/Dockerfile
    container_name: neft-processing-billing-worker-1
    environment:
      ROLE: worker
      QUEUES: celery,default,billing,pdf,edo
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy

  billing-beat:
    <<: *app_env
    build:
      context: .
      dockerfile: platform/billing-clearing/Dockerfile
    container_name: neft-processing-billing-beat-1
    environment:
      ROLE: beat
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neft:change-me@postgres:5432/neft}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: neft-processing-celery-exporter-1
    command: ["--broker-url=redis://redis:6379/0"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9808:9808"

  admin-web:
    build:
      context: .
      dockerfile: frontends/admin-ui/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_CORE_API_BASE: /api/core
        VITE_AUTH_API_BASE: /api/v1/auth
        VITE_AI_API_BASE: /api/ai
        VITE_PUBLIC_BASE: /admin/
        NEFT_DEMO_LOGIN_ENABLED: ${NEFT_DEMO_LOGIN_ENABLED:-false}
        NEFT_DEMO_ADMIN_EMAIL: ${NEFT_DEMO_ADMIN_EMAIL:-admin@neft.local}
    container_name: neft-processing-admin-web-1

  client-web:
    build:
      context: .
      dockerfile: frontends/client-portal/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_CORE_API_BASE: /api/core
        VITE_AUTH_API_BASE: /api/v1/auth
        VITE_AI_API_BASE: /api/ai
        VITE_PUBLIC_BASE: /client/
    container_name: neft-processing-client-web-1

  partner-web:
    build:
      context: .
      dockerfile: frontends/partner-portal/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_CORE_API_BASE: /api/core
        VITE_AUTH_API_BASE: /api/v1/auth
        VITE_AI_API_BASE: /api/ai
        VITE_PUBLIC_BASE: /partner/
    container_name: neft-processing-partner-web-1

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: neft-processing-gateway-1
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      integration-hub:
        condition: service_healthy
      logistics-service:
        condition: service_healthy
      crm-service:
        condition: service_healthy
      admin-web:
        condition: service_started
      client-web:
        condition: service_started
      partner-web:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "80:80"

  otel-collector:
    build:
      context: .
      dockerfile: infra/otel-collector.Dockerfile
    container_name: neft-processing-otel-collector-1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
      - "13133:13133"

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: neft-processing-jaeger-1
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
      - "4319:4317"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: neft-processing-prometheus-1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus_rules.yml:/etc/prometheus/prometheus_rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      gateway:
        condition: service_healthy
      otel-collector:
        condition: service_started
      celery-exporter:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: neft-processing-grafana-1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:2.9.10
    container_name: neft-processing-loki-1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.10
    container_name: neft-processing-promtail-1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    ports:
      - "9080:9080"

  flower:
    build:
      context: .
      dockerfile: services/flower/Dockerfile
    container_name: neft-processing-flower-1
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-change-me:change-me}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clickhouse-data:
  auth-keys:
  prometheus-data:
  grafana-data:
  loki-data:
