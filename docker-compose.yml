services:
  postgres:
    image: postgres:16
    container_name: neft-processing-postgres-1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neft}
      POSTGRES_USER: ${POSTGRES_USER:-neft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neft}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neft}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: neft-processing-redis-1
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: neft-processing-core-api-1
    environment:
      SERVICE_NAME: core-api
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://neft:neft@postgres:5432/neft}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8001:8000"

  auth-host:
    build:
      context: .
      dockerfile: services/auth-host/Dockerfile
    container_name: neft-processing-auth-host-1
    environment:
      SERVICE_NAME: auth-host
      CORE_API_URL: http://core-api:8000/api/v1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8002:8000"

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: neft-processing-ai-service-1
    environment:
      SERVICE_NAME: ai-service
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8003:8000"

  workers:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: neft-processing-workers-1
    environment:
      SERVICE_NAME: workers
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "services.workers.app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    container_name: neft-processing-beat-1
    command: ["celery", "-A", "services.workers.app.celery_app", "beat", "-l", "info"]
    environment:
      SERVICE_NAME: beat
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "services.workers.app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  flower:
    image: mher/flower:1.2.0
    container_name: neft-processing-flower-1
    depends_on:
      - redis
      - workers
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: >
      celery
      --broker=redis://redis:6379/0
      --result-backend=redis://redis:6379/1
      flower
      --port=5555
    ports:
      - "5555:5555"
    restart: unless-stopped

  admin-web:
    build:
      context: ./services/admin-web
      dockerfile: Dockerfile
    container_name: neft-processing-admin-web-1
    image: neft-processing-admin-web
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5


  gateway:
    image: nginx:1.27
    container_name: neft-processing-gateway-1
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      core-api:
        condition: service_healthy
      auth-host:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      admin-web:
        condition: service_healthy
    ports:
      - "80:80"



volumes:
  postgres-data:
