global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:80']
  - job_name: core-api
    metrics_path: /metrics
    static_configs:
      - targets: ['core-api:8000']
  - job_name: auth-host
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['auth-host:8000']
  - job_name: ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ['ai-service:8000']
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:9464']
  - job_name: crm-service
    metrics_path: /metrics
    static_configs:
      - targets: ['crm-service:8000']
  - job_name: logistics-service
    metrics_path: /metrics
    static_configs:
      - targets: ['logistics-service:8000']
  - job_name: document-service
    metrics_path: /metrics
    static_configs:
      - targets: ['document-service:8000']
  - job_name: celery-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['celery-exporter:9808']
