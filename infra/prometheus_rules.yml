groups:
  - name: observability.rules
    rules:
      - alert: ExportJobFailuresSpike
        expr: rate(export_job_failures_total[5m]) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Export job failures spike"
          description: "Export job failures are above 1/min for 10 minutes."

      - alert: ExportJobsStuck
        expr: export_jobs_running_age_seconds > 900
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Export jobs stuck running"
          description: "Oldest running export job exceeds 15 minutes."

      - alert: EmailFailuresSpike
        expr: rate(email_outbox_failed_total[5m]) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Email failures spike"
          description: "Email failures are above 1/min for 10 minutes."

      - alert: EmailOutboxBacklogHigh
        expr: email_outbox_backlog > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Email outbox backlog high"
          description: "Queued email backlog is above 100 for 10 minutes."

      - alert: ReportScheduleLagHigh
        expr: histogram_quantile(0.95, sum(rate(report_schedule_trigger_lag_seconds_bucket[5m])) by (le)) > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Report schedule lag high"
          description: "p95 report schedule trigger lag is above 10 minutes."
