server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job
      - target_label: env
        replacement: local
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            trace_id: trace_id
            span_id: span_id
            service: service
            tenant: tenant
      - labels:
          level:
          trace_id:
          span_id:
          tenant:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - 2006-01-02T15:04:05Z07:00
