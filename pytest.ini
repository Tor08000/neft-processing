[pytest]
addopts = -ra --import-mode=importlib
testpaths =
    tests_host
norecursedirs =
    dist
    build
    .git
    .venv
    node_modules
    platform
    services
    shared
filterwarnings =
    ignore:PydanticDeprecatedSince20:DeprecationWarning
    ignore:.*on_event is deprecated.*:DeprecationWarning
markers =
    unit: tests that are isolated and can run on SQLite
    smoke: end-to-end smoke scenarios for CI gating
    integration: mark tests that require external services such as Postgres
    contracts: contract tests for APIs and events
    contracts_api: contract tests for OpenAPI surfaces
    contracts_events: contract tests for event schemas
