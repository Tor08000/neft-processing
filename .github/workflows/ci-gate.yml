name: Unified PR Gate CI

on:
  pull_request:

concurrency:
  group: ci-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python lint/format checks
        run: scripts/ci/gate_python_lint.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontends/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Frontend lint/typecheck
        run: scripts/ci/gate_frontend_typecheck.sh

      - name: Client portal lint/typecheck (explicit)
        run: |
          cd frontends/client-portal
          npm ci
          npm run typecheck
          npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: scripts/ci/gate_unit_tests.sh

      - name: Processing-core client v1 me unit
        run: pytest -q platform/processing-core/app/tests/test_client_v1_me.py

      - name: Processing-core client onboarding v1 unit
        run: pytest -q platform/processing-core/app/tests/test_client_onboarding_v1.py

      - name: Processing-core onboarding review admin v1 unit
        run: pytest -q platform/processing-core/app/tests/test_onboarding_review_admin_v1.py

      - name: Processing-core onboarding approve flow unit
        run: pytest -q platform/processing-core/app/tests/test_admin_onboarding_approve.py platform/processing-core/app/tests/test_client_me_after_approve.py platform/processing-core/app/tests/test_client_users_no_missing_tables.py

      - name: Processing-core client users invitations and roles unit
        run: pytest -q platform/processing-core/app/tests/test_client_users_list.py platform/processing-core/app/tests/test_client_users_invite.py platform/processing-core/app/tests/test_client_users_roles.py

      - name: Processing-core invitation resend/revoke unit
        run: pytest -q platform/processing-core/app/tests/test_client_invitations_resend_revoke.py

      - name: Processing-core notification outbox worker unit
        run: pytest -q platform/processing-core/app/tests/test_notification_outbox_worker.py

      - name: Integration-hub notifications unit
        run: pytest -q platform/integration-hub/neft_integration_hub/tests/test_notifications_send.py

      - name: Processing-core generated docs v1 unit
        run: pytest -q platform/processing-core/app/tests/test_client_generated_docs_v1.py

      - name: Processing-core client doc signing unit
        run: pytest -q platform/processing-core/app/tests/test_client_doc_signing.py

      - name: Processing-core client docflow timeline unit
        run: pytest -q platform/processing-core/app/tests/test_client_docflow_timeline.py

      - name: Processing-core client docflow packages unit
        run: pytest -q platform/processing-core/app/tests/test_client_docflow_packages.py

      - name: Processing-core client docflow notifications unit
        run: pytest -q platform/processing-core/app/tests/test_client_notifications.py

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: neft
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/neft
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run migrations gate
        run: scripts/ci/gate_migrations.sh


  phase3-postgres:
    name: Phase3 tamper tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: neft
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_DSN: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/neft
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/neft
      NEFT_DB_SCHEMA: processing_core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install processing-core dependencies
        run: pip install -r platform/processing-core/requirements.txt

      - name: Alembic upgrade head
        working-directory: platform/processing-core
        run: alembic -c app/alembic.ini upgrade head

      - name: Run Phase3 tamper tests
        working-directory: platform/processing-core
        run: pytest -q app/tests/test_phase3_tamper_evidence.py

  postgres-migration-smoke:
    name: Postgres migration smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neft_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/neft_smoke
      NEFT_DB_SCHEMA: processing_core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install processing-core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e shared/python
          pip install -r platform/processing-core/requirements.txt

      - name: Install postgres client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        shell: bash
        run: |
          until pg_isready -h 127.0.0.1 -U postgres; do sleep 1; done

      - name: Alembic upgrade head (clean DB)
        working-directory: platform/processing-core
        run: |
          alembic -c app/alembic.ini upgrade head

      - name: Validate single head
        working-directory: platform/processing-core
        run: |
          alembic -c app/alembic.ini heads

      - name: Basic schema check
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/neft_smoke -c "\\dt"

  rbac-contract-suite:
    name: RBAC Contract Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e shared/python
          python -m pip install -r platform/auth-host/requirements.txt
          python -m pip install -r platform/processing-core/requirements.txt

      - name: Run RBAC contract tests (clean env)
        run: |
          unset DATABASE_URL || true
          unset PYTHONPATH || true
          pytest -q platform/auth-host/app/tests/test_rbac_contract.py
          pytest -q platform/processing-core/app/tests/test_rbac_contract.py

  auth-signup-smoke:
    name: Auth signup smoke (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_smoke
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5433/auth_smoke
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: '5433'
      POSTGRES_DB: auth_smoke
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e shared/python
          python -m pip install -r platform/auth-host/requirements.txt
          python -m pip install -r platform/processing-core/requirements.txt

      - name: Install postgres client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        shell: bash
        run: |
          until pg_isready -h 127.0.0.1 -p 5433 -U postgres; do sleep 1; done

      - name: Run auth-host signup regression suite
        run: |
          pytest -q platform/auth-host/app/tests/test_signup_flow.py

  compose-prod-e2e:
    name: Compose prod e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-typecheck, unit-tests, migrations]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose up and healthchecks
        env:
          APP_ENV: test
          CLIENT_SIGN_MODE: otp
          OTP_PROVIDER: stub
          OTP_PROVIDER_STUB_ECHO_CODE: '1'
          NOTIFY_EMAIL_ENABLED: '0'
          EMAIL_PROVIDER: stub
        run: scripts/ci/gate_compose_up.sh

      - name: Gateway e2e smoke
        run: scripts/ci/gate_e2e_smoke.sh

      - name: Client onboarding smoke
        run: scripts/ci/smoke_client_onboarding.sh

      - name: Client onboarding documents smoke
        run: scripts/ci/smoke_client_onboarding_documents.sh

      - name: Client generated docs smoke
        run: scripts/ci/smoke_client_generated_docs.sh

      - name: Client doc signing smoke
        run: scripts/ci/smoke_client_doc_signing.sh

      - name: Client onboarding review smoke
        run: scripts/ci/smoke_onboarding_review_flow.sh
      - name: Client approve flow smoke
        run: scripts/ci/smoke_client_approve_flow.sh
      - name: Client users smoke
        run: scripts/ci/smoke_client_users.sh

      - name: Client invitation resend/revoke smoke
        run: scripts/ci/smoke_client_invitation_resend_revoke.sh

      - name: Client docflow smoke
        run: scripts/ci/smoke_client_docflow.sh

      - name: Playwright smoke
        run: scripts/ci/gate_playwright_smoke.sh

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/docker-compose-ps.txt || true
          docker compose logs --no-color --tail=200 gateway core-api auth-host integration-hub logistics-service > artifacts/docker-compose-services.log || true

      - name: Upload docker logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: artifacts/

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontends/e2e/playwright-report/

      - name: Tear down compose
        if: always()
        run: docker compose down -v --remove-orphans

  gate:
    name: PR Gate
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, migrations, phase3-postgres, postgres-migration-smoke, rbac-contract-suite, auth-signup-smoke, compose-prod-e2e]
    steps:
      - name: Unified gate passed
        run: echo "Unified PR gate passed"
