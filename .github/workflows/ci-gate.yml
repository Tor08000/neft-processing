name: Unified PR Gate CI

on:
  pull_request:

concurrency:
  group: ci-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python lint/format checks
        run: scripts/ci/gate_python_lint.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontends/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Frontend lint/typecheck
        run: scripts/ci/gate_frontend_typecheck.sh

      - name: Client portal lint/typecheck (explicit)
        run: |
          cd frontends/client-portal
          npm ci
          npm run typecheck
          npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: scripts/ci/gate_unit_tests.sh

      - name: Processing-core client v1 me unit
        run: pytest -q platform/processing-core/app/tests/test_client_v1_me.py

      - name: Processing-core client onboarding v1 unit
        run: pytest -q platform/processing-core/app/tests/test_client_onboarding_v1.py

      - name: Processing-core onboarding review admin v1 unit
        run: pytest -q platform/processing-core/app/tests/test_onboarding_review_admin_v1.py

      - name: Processing-core generated docs v1 unit
        run: pytest -q platform/processing-core/app/tests/test_client_generated_docs_v1.py

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: neft
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d neft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/neft
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run migrations gate
        run: scripts/ci/gate_migrations.sh

  compose-prod-e2e:
    name: Compose prod e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-typecheck, unit-tests, migrations]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose up and healthchecks
        run: scripts/ci/gate_compose_up.sh

      - name: Gateway e2e smoke
        run: scripts/ci/gate_e2e_smoke.sh

      - name: Client onboarding smoke
        run: scripts/ci/smoke_client_onboarding.sh

      - name: Client onboarding documents smoke
        run: scripts/ci/smoke_client_onboarding_documents.sh

      - name: Client generated docs smoke
        run: scripts/ci/smoke_client_generated_docs.sh

      - name: Client onboarding review smoke
        run: scripts/ci/smoke_onboarding_review_flow.sh

      - name: Playwright smoke
        run: scripts/ci/gate_playwright_smoke.sh

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose ps > artifacts/docker-compose-ps.txt || true
          docker compose logs --no-color --tail=200 gateway core-api auth-host integration-hub logistics-service > artifacts/docker-compose-services.log || true

      - name: Upload docker logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: artifacts/

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontends/e2e/playwright-report/

      - name: Tear down compose
        if: always()
        run: docker compose down -v --remove-orphans

  gate:
    name: PR Gate
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, migrations, compose-prod-e2e]
    steps:
      - name: Unified gate passed
        run: echo "Unified PR gate passed"
