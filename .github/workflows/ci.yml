name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install build tools
        run: python -m pip install -U pip setuptools wheel
      - name: Install service packages
        run: |
          pip install -e platform/logistics-service
      - name: Run service tests
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e platform/integration-hub
          pytest platform/integration-hub -q
          pytest platform/logistics-service -q
  migration-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend images
        run: docker compose build admin-web client-web partner-web
      - name: Build core-api image (no cache)
        run: docker compose build --no-cache core-api
      - name: Start postgres
        run: docker compose -f docker-compose.yml -f docker-compose.smoke.yml --profile smoke up -d postgres
      - name: Check protected alembic revisions
        run: |
          docker compose -f docker-compose.yml -f docker-compose.smoke.yml --profile smoke run --rm --entrypoint "" \
            core-api python -m app.alembic.check_protected_revisions
      - name: Check alembic revision uniqueness
        run: |
          docker compose -f docker-compose.yml -f docker-compose.smoke.yml --profile smoke run --rm --entrypoint "" \
            core-api python -m app.alembic.check_revision_uniqueness
      - name: Check alembic heads
        run: |
          count="$(docker compose -f docker-compose.yml -f docker-compose.smoke.yml --profile smoke run --rm --entrypoint "" \
            core-api alembic -c app/alembic.ini heads | wc -l | tr -d ' ')"
          if [ "$count" -gt 1 ]; then
            echo "Expected 1 alembic head, got $count"
            echo "Resolve with: alembic merge <head1> <head2>"
            exit 1
          fi
      - name: Alembic upgrade head
        run: docker compose -f docker-compose.yml -f docker-compose.smoke.yml --profile smoke run --rm --entrypoint "" core-api alembic -c app/alembic.ini upgrade head


  processing-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run processing-core tests
        run: |
          docker compose run --rm --entrypoint "" core-api pytest -q \
            platform/processing-core/app/tests/test_partner_admin_api.py \
            platform/processing-core/app/tests/test_partner_portal_api.py \
            platform/processing-core/app/tests/test_partner_migration_smoke.py

  partner-portal-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/partner-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  e2e-gateway-partner-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gateway partner smoke
        run: scripts/ci/e2e_partner_smoke.sh
