worker_processes 1;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"client-web"}';
        }

        location ^~ /assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ^~ /client/assets/ {
            rewrite ^/client/assets/(.*)$ /assets/$1 break;
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ^~ /brand/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ^~ /client/brand/ {
            rewrite ^/client/brand/(.*)$ /brand/$1 break;
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /client/ {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store";
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store";
        }
    }
}
