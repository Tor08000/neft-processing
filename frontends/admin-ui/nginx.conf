worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        # Статика лежит здесь
        root /usr/share/nginx/html;
        index index.html;

        # health для docker compose
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Single Page Application – всегда отдаём index.html
        location / {
            try_files $uri /index.html;
        }
    }
}
