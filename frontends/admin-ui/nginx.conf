worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index admin/index.html;

        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /admin/ {
            try_files $uri $uri/ /admin/index.html;
        }
    }
}
