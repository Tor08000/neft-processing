<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Invoice</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; color: #111; }
      h1 { font-size: 20px; margin-bottom: 12px; }
      table { width: 100%; border-collapse: collapse; margin-top: 16px; }
      th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
      .totals { margin-top: 12px; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>Invoice</h1>
    <div><strong>Invoice No:</strong> {{ invoice_number }}</div>
    <div><strong>Client:</strong> {{ client_name }}</div>
    <div><strong>Issue date:</strong> {{ issue_date }}</div>
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Quantity</th>
          <th>Unit price</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>{{ item.description }}</td>
          <td>{{ item.quantity }}</td>
          <td>{{ item.unit_price }}</td>
          <td>{{ item.amount }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <div class="totals">Total: {{ total_amount }} {{ currency }}</div>
  </body>
</html>
