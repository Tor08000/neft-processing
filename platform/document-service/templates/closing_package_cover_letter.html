<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Closing Package Cover Letter</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; color: #111; }
      h1 { font-size: 20px; margin-bottom: 12px; }
      .meta { margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <h1>Closing Package Cover Letter</h1>
    <div class="meta">
      <div><strong>Client:</strong> {{ client_name }}</div>
      <div><strong>Period:</strong> {{ period_from }} — {{ period_to }}</div>
      <div><strong>Package No:</strong> {{ package_number }}</div>
    </div>
    <p>Please find the monthly closing package enclosed.</p>
    <p>Contact: {{ contact_name }} ({{ contact_email }})</p>
  </body>
</html>
