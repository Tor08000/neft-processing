limit.exceeded.amount.daily:
  title: "Превышен дневной лимит"
  description: >
    Сумма операции превышает дневной лимит на {limit_value} {currency}
  what_to_do:
    - "Проверьте актуальный лимит и профиль клиента"
    - "При необходимости запросите повышение лимита"

LIMIT_EXCEEDED:
  title: "Превышен лимит"
  description: "Лимит ({scope_type}) {limit_value} на период {period} превышен"
  recommendation: "Изменить лимит, тариф или период списания"

LIMIT_PERIOD_MISMATCH:
  title: "Несовпадение периода лимита"
  description: "Операция не попадает в период лимита {period} ({scope_type})"
  recommendation: "Проверьте период лимита или обновите настройки периода"

SUBSCRIPTION_LIMIT:
  title: "Лимит по подписке"
  description: "Достигнут лимит тарифа по метрике {metric}"
  recommendation: "Изменить тариф/подписку или дождаться следующего периода"
