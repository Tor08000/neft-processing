logistics.off_route.confirmed:
  title: "Подтверждено отклонение от маршрута"
  description: >
    Где отклонились: {stop_name}, {distance_km} км, {time_delta_minutes} мин.
    Почему нарушение: превышен порог {max_deviation_km} км (правило маршрута).
  what_to_do:
    - "Проверьте фактический маршрут"
    - "Уточните у водителя причину отклонения"

LOGISTICS_DEVIATION:
  title: "Отклонение от маршрута"
  description: >
    Где отклонились: {stop_name}, {distance_km} км, {time_delta_minutes} мин.
    Почему нарушение: превышен порог {max_deviation_km} км (правило маршрута).
  recommendation: "Скорректировать маршрут или подтвердить остановку"

LOGISTICS_STOP_MISUSE:
  title: "Нецелевая остановка"
  description: >
    Где отклонились: остановка {stop_name}, {distance_km} км, {time_delta_minutes} мин.
    Почему нарушение: остановка вне радиуса {stop_radius_m} м (правило остановок).
  recommendation: "Проверить маршрут и подтвердить корректность остановки"
