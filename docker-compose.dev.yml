services:
  auth-host:
    environment:
      APP_ENV: dev
      START_MODE: DEV
      DEV_SEED_USERS: 1
      AUTH_DB_RECOVERY: reset
      DEV_DB_RECOVERY: reset
      AUTH_ALEMBIC_AUTO_REPAIR: 1
      NEFT_AUTH_ISSUER: neft-auth
      NEFT_AUTH_AUDIENCE: neft-admin
      NEFT_CLIENT_ISSUER: neft-auth
      NEFT_CLIENT_AUDIENCE: neft-client

  core-api:
    environment:
      APP_ENV: dev
      ALEMBIC_AUTO_REPAIR: 1
      NEFT_AUTH_ISSUER: neft-auth
      NEFT_AUTH_AUDIENCE: neft-admin
      NEFT_CLIENT_AUDIENCE: neft-client
      NEFT_CLIENT_ISSUER: neft-auth
      # Dev-only: reset schema when alembic_version_core is empty but schema has tables.
      # DB_RESET_ON_VERSION_MISSING: 1

  logistics-service:
    environment:
      APP_ENV: dev
      LOGISTICS_PROVIDER: mock
      USE_MOCK_LOGISTICS: 1

  integration-hub:
    environment:
      APP_ENV: dev
      DIADOK_MODE: mock
      NOTIFICATIONS_MODE: mock
      EMAIL_PROVIDER_MODE: mock
      OTP_PROVIDER_MODE: mock


  document-service:
    environment:
      APP_ENV: dev
      PROVIDER_X_MODE: mock
