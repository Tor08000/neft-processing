services:
  auth-host:
    environment:
      APP_ENV: dev
      START_MODE: DEV
      DEV_SEED_USERS: 1

  core-api:
    environment:
      APP_ENV: dev
      ALEMBIC_AUTO_REPAIR: 1
      # Dev-only: reset schema when alembic_version_core is empty but schema has tables.
      # DB_RESET_ON_VERSION_MISSING: 1

  logistics-service:
    environment:
      APP_ENV: dev
      LOGISTICS_PROVIDER: mock
      USE_MOCK_LOGISTICS: 1
