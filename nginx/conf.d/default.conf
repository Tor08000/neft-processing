# =========================
# Основной сервер и прокси
# =========================
server {
    listen 80;
    server_name _;

    # Разрешаем подчёркивания для внутренних заголовков
    underscores_in_headers on;

    # -------------------------
    # Healthchecks
    # -------------------------
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # -------------------------
    # Core API (/api/...)
    # -------------------------
    location ^~ /api/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        proxy_pass http://core_api;
    }

    # -------------------------
    # Auth-host (/auth/...)
    # -------------------------
    location ^~ /auth/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Снимаем префикс /auth перед проксированием
        rewrite ^/auth/?(.*)$ /$1 break;
        proxy_pass http://auth_host;
    }

    # -------------------------
    # AI-service (/ai/...)
    # -------------------------
    location ^~ /ai/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;

        proxy_pass http://ai_service;
    }

    # -------------------------
    # Admin UI (/admin/...)
    # -------------------------
    location ^~ /admin/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Убираем префикс, чтобы статика искалась с корня
        rewrite ^/admin/?(.*)$ /$1 break;
        proxy_pass http://admin_ui;
    }

    # -------------------------
    # Фолбэк: отдаём админку
    # -------------------------
    location / {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        proxy_pass http://admin_ui;
    }
}
