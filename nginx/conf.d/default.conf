# =========================
# Upstreams
# =========================
upstream core_api {
    server core-api:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}
upstream auth_host {
    server auth-host:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}
upstream ai_service {
    server ai-service:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}
upstream flower_upstream {
    server flower:5555 max_fails=3 fail_timeout=10s;
    keepalive 8;
}

# =========================
# Limits / Security (http{}-scope)
# =========================
# Лимитируем частоту обращений к /auth/authorize
limit_req_zone $binary_remote_addr zone=rl_auth:10m rate=30r/s;

# (опционально) ограничения тела запроса
client_max_body_size 2m;

server {
    listen 80;
    server_name _;

    # Общие таймауты
    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    send_timeout          30s;

    # Кастомная страница при падении бэкенда
    error_page 502 504 /_upstream_down.html;

    location = /_upstream_down.html {
        root /usr/share/nginx/html;
        internal;
    }

    # -------------------------
    # Базовые заголовки (шаблон)
    # -------------------------
    # Не выносим в include, чтобы файл был самодостаточным.
    # Повторяем хедеры в каждом location.
    # -------------------------

    # =========================
    # Защита внутренних ручек Core API
    # =========================
    # Эти ручки должны дергаться ТОЛЬКО из auth-host по сети Docker.
    # Из внешнего мира --> 404.
    location ~ ^/v1/auth/internal/ {
        return 404;
    }

    # =========================
    # По умолчанию — Core API
    # =========================
    location / {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        proxy_pass http://core_api;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
    }

    # =========================
    # AUTH-HOST (с прокидыванием /auth)
    # =========================

    # Точечный хендлер с rate-limit для /auth/authorize
    location = /auth/authorize {
        limit_req zone=rl_auth burst=60 nodelay;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        # удаляем префикс /auth перед проксированием
        rewrite ^/auth/authorize$ /authorize break;
        proxy_pass http://auth_host;

        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
    }

    # Остальные ручки auth-host (/auth/capture, /auth/reverse, /auth/health, и т.п.)
    location ^~ /auth/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        # удаляем префикс /auth
        rewrite ^/auth/?(.*)$ /$1 break;
        proxy_pass http://auth_host;

        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
    }

    # =========================
    # AI-Service
    # =========================
    location ^~ /ai/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        rewrite ^/ai/?(.*)$ /$1 break;
        proxy_pass http://ai_service;

        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
    }

    # =========================
    # Flower (Celery мониторинг)
    # =========================
    location ^~ /flower/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        rewrite ^/flower/?(.*)$ /$1 break;
        proxy_pass http://flower_upstream;

        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_intercept_errors on;
    }
}
