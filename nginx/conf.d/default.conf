# =========================
# Upstreams
# =========================
upstream core_api {
    server core-api:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream auth_host {
    server auth-host:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream ai_service {
    server ai-service:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream flower_upstream {
    server flower:5555 max_fails=3 fail_timeout=10s;
    keepalive 4;
}

# =========================
# Основной сервер
# =========================
server {
    listen 80;
    server_name _;

    # На всякий случай, чтобы не ломались нестандартные заголовки
    underscores_in_headers on;

    # -------------------------
    # Healthcheck
    # -------------------------
    # Прямой health самого nginx
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Health через core-api
    location = /api/v1/health {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_pass http://core_api;
    }

    # -------------------------
    # Core API (/api/...)
    # -------------------------
    location ^~ /api/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        proxy_pass http://core_api;
    }

    # -------------------------
    # Core API v1 (/api/v1/...)
    # -------------------------
    location ^~ /api/v1/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        proxy_pass http://core_api;
    }

    # -------------------------
    # AUTH — все возможные варианты
    # -------------------------

    # 1) Нормальный, «правильный» путь:
    #    /api/v1/auth/...  -> auth-host как есть
    location ^~ /api/v1/auth/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        proxy_pass http://auth_host;
    }

    # 2) Старый/фронтовый стиль:
    #    /auth/api/v1/...  -> /api/v1/... на auth-host
    #    Пример: /auth/api/v1/auth/login -> /api/v1/auth/login
    location ^~ /auth/api/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Переписываем URL: срезаем "/auth" и оставляем "/api/..."
        rewrite ^/auth/api/(.*)$ /api/$1 break;

        proxy_pass http://auth_host;
    }

    # 3) Обобщённый вариант:
    #    /auth/... -> убираем "/auth" и шлём дальше
    #    На будущее, если появятся другие ручки в auth-host
    location ^~ /auth/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Срезаем "/auth" и прокидываем дальше
        # /auth/xyz -> /xyz
        rewrite ^/auth/?(.*)$ /$1 break;

        proxy_pass http://auth_host;
    }

    # -------------------------
    # AI-Service
    # -------------------------
    # Прокси для ИИ-сервиса, если он живёт по пути /ai/...
    location ^~ /ai/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;

        proxy_pass http://ai_service;
    }

    # -------------------------
    # Flower (мониторинг Celery)
    # -------------------------
    location ^~ /flower/ {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Важно: оставляем путь как есть, у Flower / по умолчанию
        proxy_pass http://flower_upstream;
    }

    # -------------------------
    # Фолбэк: всё остальное на core-api
    # -------------------------
    location / {
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        proxy_pass http://core_api;
    }
}
