user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Чтобы не было проблем с большими JSON/файлами
    client_max_body_size 20m;

    # Upstreams для сервисов
    upstream core_api {
        server core-api:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream auth_host {
        server auth-host:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream ai_service {
        server ai-service:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream admin_ui {
        server admin-web:80 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    # Подключаем все сайты/прокси из conf.d
    include /etc/nginx/conf.d/*.conf;
}
