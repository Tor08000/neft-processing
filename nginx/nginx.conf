user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log info;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ОБЯЗАТЕЛЬНО: объявляем формат main
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # upstream'ы до наших сервисов
    upstream core_api {
        server core-api:8000;
    }

    upstream auth_host {
        server auth-host:8000;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    server {
        listen       80;
        server_name  _;

        # fallback страница, если upstream недоступен
        error_page 502 504 = /_upstream_down.html;

        # ядро процессинга — всё под /api/
        location /api/ {
            proxy_pass         http://core_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Auth Host — можно, например, повесить на /auth/
        location /auth/ {
            proxy_pass         http://auth_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # AI-сервис — на /ai/
        location /ai/ {
            proxy_pass         http://ai_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /_upstream_down.html {
            root /usr/share/nginx/html;
        }

        # простая health-страница
        location = / {
            return 200 "NEFT gateway is up\n";
        }
    }
}
