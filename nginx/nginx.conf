# nginx/nginx.conf — GATEWAY

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # НЕ подключаем conf.d, чтобы стандартный default.conf не бился с нашим server
    # include /etc/nginx/conf.d/*.conf;

    # ==============================
    # UPSTREAM'ы
    # ==============================
    upstream core_api {
        server core-api:8000;
    }

    upstream auth_host {
        server auth-host:8000;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    upstream admin_web {
        server admin-web:8080;
    }

    # ==============================
    # ОСНОВНОЙ SERVER
    # ==============================
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  localhost;

        # ------ health самого gateway ------
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # health core-api через gateway
        location = /api/v1/health {
            proxy_pass http://core_api/health;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------ CORE API ------
        location /api/ {
            proxy_pass http://core_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------ AUTH HOST ------
        # /auth/api/... -> auth-host /api/...
        location /auth/ {
            proxy_pass http://auth_host/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # health auth-host
        location = /auth/api/v1/health {
            proxy_pass http://auth_host/api/v1/health;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------ AI SERVICE ------
        location /ai/ {
            proxy_pass http://ai_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------ ADMIN WEB (frontend) ------
        # HTML по /admin/
        location /admin/ {
            proxy_pass http://admin_web/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ВАЖНО: статика Vite, на которую ссылается index.html
        # /assets/... -> admin-web /assets/...
        location /assets/ {
            proxy_pass http://admin_web/assets/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /vite.svg -> admin-web /vite.svg
        location = /vite.svg {
            proxy_pass http://admin_web/vite.svg;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # редирект корня на админку
        location = / {
            return 302 /admin/;
        }

        # fallback — явный 404 для всего, что не сматчило
        location / {
            return 404;
        }
    }
}
