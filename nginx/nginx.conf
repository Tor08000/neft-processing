user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Чтобы не было проблем с большими JSON/файлами
    client_max_body_size 20m;

    # Upstreams для сервисов
    upstream core_api {
        server core-api:8000;
    }

    upstream auth_host {
        server auth-host:8000;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    upstream admin_web {
        server admin-web:8080;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /health {
            proxy_pass http://core_api/health;
        }

        location /api/ {
            proxy_pass http://core_api/;
        }

        location /auth/ {
            proxy_pass http://auth_host/;
        }

        location /ai/ {
            proxy_pass http://ai_service/;
        }

        location /admin/ {
            proxy_pass http://admin_web/;
        }
    }

    # Подключаем дополнительные конфиги (например, fallback-сервер)
    include /etc/nginx/conf.d/*.conf;
}
