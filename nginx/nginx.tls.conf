server {
  listen 443 ssl http2;
  server_name localhost;

  ssl_certificate     /etc/ssl/certs/neft-local.crt;
  ssl_certificate_key /etc/ssl/private/neft-local.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # health
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "NEFT gateway ok (TLS)\n";
  }

  # прокси такие же, как в http-конфиге
  resolver 127.0.0.11 ipv6=off valid=30s;

  set $core core-api;
  set $auth auth-host;
  set $ai   ai-service;

  location /core/ {
    proxy_pass http://$core:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
  }
  location /auth/ {
    proxy_pass http://$auth:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
  }
  location /ai/ {
    proxy_pass http://$ai:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
  }

  location / {
    add_header Content-Type text/plain;
    return 200 "NEFT gateway ok (TLS)\n";
  }
}
